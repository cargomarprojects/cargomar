<div class="page-search">
    <div class="row">
        <div class="col-sm-4">
            <div class="form-group row">
                <label class="col-sm-2 col-form-label col-form-label-sm">IP</label>
                <div class="col-sm-10">
                    <input type="text" class="col form-control form-control-sm" name="Searchip" [(ngModel)]="search_ip"
                        (blur)="OnBlur('search_ip')" />
                </div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="form-group row">
                <div class="col-sm-10">
                    <button [disabled]="loading" (click)="List('NEW')"
                        class="btn btn-primary btn-sm mr-1">Search</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="page-pager">
    <div class="form-group input-group row my-1 mx-0">
        <ul *ngIf="page_count" class="pagination pagination-sm mb-1">
            <li class="page-item"><a class="page-link">Page {{page_current}}/{{page_count}}
                    (Records-{{page_rowcount}})</a></li>
            <li class="page-item"><a class="page-link" (click)="List('FIRST')"><span class="fa fa-backward"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('PREV')"><span class="fa fa-arrow-left"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('NEXT')"><span
                        class="fa fa-arrow-right"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('LAST')"><span class="fa fa-forward"></span></a>
            </li>
        </ul>
    </div>
</div>
<div class="table-responsive my-0 p-0">
    <table class="table table-hover table-sm table-bordered table-striped">
        <thead class="page-body-thead">
            <tr>
                <th>USER</th>
                <th>IP</th>
                <th>DEVICE</th>
                <th>CREATED.DT</th>
            </tr>
        </thead>
        <tbody class="page-body-tbody">
            <tr *ngFor="let rec of RecordList; let i = index" [class.active]="i == selectedRowIndex"
                (mousedown)="selectedRowIndex=i">
                <td>{{rec.audit_user_code}}</td>
                <td>{{rec.audit_userip}}</td>
                <td>{{rec.audit_deviceid}}</td>
                <td>{{rec.rec_created_date}}</td>
            </tr>
        </tbody>
    </table>
</div>
<div class="page-pager">
    <div *ngIf="page_count">
        <ul class="pagination pagination-sm mb-1">
            <li class="page-item"><a class="page-link">Page {{page_current}}/{{page_count}}
                    (Records-{{page_rowcount}})</a></li>
            <li class="page-item"><a class="page-link" (click)="List('FIRST')"><span class="fa fa-backward"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('PREV')"><span class="fa fa-arrow-left"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('NEXT')"><span
                        class="fa fa-arrow-right"></span></a>
            </li>
            <li class="page-item"><a class="page-link" (click)="List('LAST')"><span class="fa fa-forward"></span></a>
            </li>
        </ul>
    </div>
</div>

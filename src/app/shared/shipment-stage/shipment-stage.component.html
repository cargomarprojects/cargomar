<div class="modal-body">
  <div class="page-box">
    <div class="row">
      <div class="col-sm-12">
        <div class="page-body table-responsive pointer">
          <table class="table table-hover table-sm table-bordered table-striped">
            <thead class="page-body-thead">
              <tr>
                <th>ORDER</th>
                <th>SHIPMENT STAGE</th>
                <th>SELECT</th>
                <th>DATE</th>
              </tr>
            </thead>
            <tbody class="page-body-tbody">
              <tr *ngFor="let rec of RecordList; let i = index" [class.active]="i == selectedRowIndex"
                (mousedown)="selectedRowIndex=i">

                <td>
                  {{rec.stage_order}}
                </td>

                <td>
                  {{rec.stage_name}}
                </td>
                <td class="hlink_blue" (click)="selectRow(rec)">
                  SEELECT
                </td>
                <td>
                  {{rec.stage_date | date:'dd-MM-yyyy' }}
                </td>

              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <div class="page-box">
    <div class="row justify-content-center p-1">
      <div class="col-sm-12">
        <div class="form-group row">
          <label class="col-2 col-form-label  col-form-label-sm">Stage</label>
          <div class="col-4">
            <select class="form-control form-control-sm" [(ngModel)]="_stage">
              <option *ngFor="let rec of RecordList" [value]="rec.stage_name">{{rec.stage_name}}</option>
            </select>
          </div>
          <label class="col-2 col-form-label  col-form-label-sm">Date</label>
          <div class="col-2">
            <app-date [inputdate]="_stage_date" (ValueChanged)="_stage_date=$event"></app-date>
          </div>
          <div class="col-2">
            <button class="btn btn-primary btn-sm mr-1" (click)="CloseModal('OK')">Update Stage</button>
            <button (click)="ShowHistory(history)" class="btn btn-success btn-sm mr-1">History</button>

          </div>
        </div>

      </div>
    </div>
  </div>


</div>



<ng-template #history let-c="close" let-d="dismiss">
  <div class="modal-header" style="cursor: move;" (mousedown)="gs.startDrag($event)">
    <h4 class="modal-title">History</h4>
    <button type="button" class="close" aria-label="Close" (click)="d('Cross click')">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <app-history [pkid]="_pkid" [type]="'JOB-OPERATIONS'" [usetype]="'Y'"></app-history>
  </div>
</ng-template>

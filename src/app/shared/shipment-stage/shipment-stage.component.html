<div class="modal-body">
  <div class="page-box">
    <div class="row">
      <div class="col-sm-12">
        <div class="table-responsive fixedTableHead m-0 p-0">
          <table class="table table-hover table-sm table-bordered table-striped">
            <thead class="page-body-thead">
              <tr>
                <th>ORDER</th>
                <th>SHIPMENT STAGE</th>
                <th>DATE</th>
              </tr>
            </thead>
            <tbody class="page-body-tbody">
              <tr *ngFor="let rec of RecordList; let i = index" [class.active]="i == selectedRowIndex" [class.makebold]="i == selectedRowIndex" 
                (mousedown)="selectedRowIndex=i">
                 <td style="padding:1px 1px 1px 1px">
                  {{rec.stage_order}}
                </td>
                <td style="padding:1px 1px 1px 1px" >
                  {{rec.stage_name}}
                </td>
                <td style="padding:1px 50px 1px 1px">
                  <app-date [disabled]="rec.stage_editable === 'N'" [inputdate]="rec.stage_date"
                    (ValueChanged)="rec.stage_date=$event"></app-date>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <div class="page-box">
    <div class="row justify-content-center p-1">
      <div class="col-sm-12">
        <div class="form-group row ">
          <div class="col text-center">
            <button (click)="Save()" class="btn btn-success btn-sm mr-1">Save</button>
            <button (click)="ShowHistory(history)" class="btn btn-success btn-sm mr-1">History</button>
          </div>
        </div>
      </div>
    </div>
  </div>


</div>



<ng-template #history let-c="close" let-d="dismiss">
  <div class="modal-header" style="cursor: move;" (mousedown)="gs.startDrag($event)">
    <h4 class="modal-title">History</h4>
    <button type="button" class="close" aria-label="Close" (click)="d('Cross click')">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <app-history [pkid]="_pkid" [type]="'JOB-OPERATIONS'" [usetype]="'Y'"></app-history>
  </div>
</ng-template>

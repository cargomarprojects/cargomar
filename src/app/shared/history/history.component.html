<div class="page-list pointer">
  <div class="row m-0">
    <div class="col-12">
      <div class="form-group row">
        <label class="col-sm-3 col-form-label col-form-label-sm">Search</label>
        <div class="col-sm-5">
          <input type="text" class="form-control form-control-sm" [(ngModel)]="searchString"
            (ngModelChange)="SearchReport()" maxlength="200" />
        </div>
        <div class="col-sm-3">
          <a class="hlink_blue" style="text-decoration: underline;" (click)="showHide()"> show/hide </a>
        </div>
      </div>
      <!-- <div class="m-1" style="display: flex; justify-content: flex-end;text-decoration: underline;">
        <a class="hlink_blue" (click)="showHide()"> show/hide </a>
      </div> -->
    </div>
  </div>
</div>

<div class="page-list pointer">
  <div class="row m-0">
    <div class="col-12">

      <div class="page-body table-responsive fixedTableHead m-0 p-0" style="height: calc(100vh - 500px);">
        <table class="table table-hover table-sm table-bordered table-striped">
          <thead class="page-body-thead">
            <tr>
              <th>DATE</th>
              <th>ACTION</th>
              <th>USER</th>
              <th>REFNO</th>
              <th>REMARKS</th>
              <th *ngIf="bShow">COMPUTER</th>
              <th *ngIf="bShow">APPID</th>
              <th *ngIf="bShow">DEVICE</th>
            </tr>
          </thead>
          <tbody class="page-body-tbody">
            <tr *ngFor="let rec of RecordList; let i = index" [class.active]="i == selectedRowIndex"
              (click)="selectedRowIndex=i">
              <td>{{rec.audit_date}}</td>
              <td>{{rec.audit_action}}</td>
              <td>{{rec.audit_user_code}}</td>
              <td class="wrap-text">{{rec.audit_refno}}</td>
              <td class="wrap-text">{{rec.audit_remarks}}</td>
              <td *ngIf="bShow">{{rec.audit_computer}}</td>
              <td *ngIf="bShow">{{rec.audit_appid}}</td>
              <td *ngIf="bShow">{{rec.audit_deviceid}}</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>
<br>
<App-Wait [visible]="loading" [msg]="'Please Wait'"></App-Wait>
<div *ngIf="InfoMessage" class="alert alert-success">
  {{InfoMessage}}
</div>
<div *ngIf="ErrorMessage" class="alert alert-danger">
  {{ErrorMessage}}
</div>
